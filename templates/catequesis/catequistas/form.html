{% extends 'base.html' %}

{% block title %}Catequista{% endblock %}
{% block header %}Catequista{% endblock %}

{% block content %}
<h1 class="page-title">
    {% if modo == 'editar' %}Editar catequista{% else %}Nuevo catequista{% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    <div class="field">
        <label for="{{ form.nombre.id_for_label }}">Nombre</label>
        {{ form.nombre }}
        {{ form.nombre.errors }}
    </div>

    <div class="actions">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'lista_catequistas' %}" class="btn btn-secondary">Volver</a>
    </div>
</form>
{% endblock %}

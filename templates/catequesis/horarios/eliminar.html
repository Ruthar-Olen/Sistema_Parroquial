{% extends 'base.html' %}

{% block title %}Eliminar horario{% endblock %}
{% block header %}Eliminar horario{% endblock %}

{% block content %}
<h1 class="page-title">Eliminar horario</h1>
<p>¿Seguro que deseas eliminar el horario <strong>{{ objeto }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <div class="actions">
        <button type="submit" class="btn btn-primary">Sí, eliminar</button>
        <a href="{% url 'menu_catequesis' %}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}

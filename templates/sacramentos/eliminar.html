<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar inscripción</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f3;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 0 18px rgba(0,0,0,0.08);
        }

        h1 {
            color: #8b1e1e;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            color: #333;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-danger {
            background: #c0392b;
            color: white;
        }

        .btn-danger:hover {
            background: #a93226;
        }

        .btn-secondary {
            background: #e6e6e6;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Eliminar inscripción</h1>

        <p>
            ¿Seguro que deseas eliminar la inscripción de
            <strong>{{ inscripcion.nombre_completo }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'lista_inscripciones' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>

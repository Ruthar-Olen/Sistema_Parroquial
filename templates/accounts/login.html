{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Parroquia Santísima Trinidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul-profundo: #14243d;
            --azul-principal: #1f3557;
            --azul-claro: #c9dff2;
            --dorado: #c9a34a;
            --dorado-suave: #e7cc84;
            --marfil: #f7f4ed;
            --texto: #243041;
            --texto-suave: #6e7785;
            --error: #b33a3a;
            --panel: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--texto);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(231, 204, 132, 0.22), transparent 28%),
                radial-gradient(circle at 20% 30%, rgba(201, 223, 242, 0.18), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(201, 163, 74, 0.14), transparent 24%),
                linear-gradient(135deg, #0f1c31 0%, #1a3153 45%, #274a71 100%);
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.35;
            pointer-events: none;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: rgba(231, 204, 132, 0.22);
            top: 4%;
            left: 8%;
        }

        body::after {
            width: 360px;
            height: 360px;
            background: rgba(201, 223, 242, 0.16);
            bottom: 6%;
            right: 6%;
        }

        .login-wrapper {
            width: 100%;
            max-width: 430px;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(231, 204, 132, 0.45);
            border-radius: 24px;
            padding: 34px 30px 28px;
            box-shadow:
                0 20px 55px rgba(8, 19, 37, 0.35),
                0 0 0 1px rgba(255,255,255,0.18) inset;
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.26), transparent 35%);
            pointer-events: none;
        }

        .logo-circle {
            width: 96px;
            height: 96px;
            margin: 0 auto 14px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(201, 163, 74, 0.6);
            background: #ffffff;
            box-shadow:
                0 0 0 6px rgba(201, 223, 242, 0.18),
                0 12px 24px rgba(20, 36, 61, 0.18);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            margin: 0;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.15rem;
            line-height: 1;
            color: var(--azul-profundo);
            letter-spacing: 0.3px;
        }

        .ornament {
            width: 96px;
            height: 3px;
            margin: 14px auto 18px;
            border-radius: 999px;
            background: linear-gradient(to right, transparent, var(--dorado), transparent);
        }

        .subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: var(--texto-suave);
            margin-bottom: 22px;
        }

        .error {
            background: rgba(179, 58, 58, 0.08);
            color: var(--error);
            border: 1px solid rgba(179, 58, 58, 0.18);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.92rem;
            margin-bottom: 16px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 0.93rem;
            font-weight: 600;
            color: var(--azul-principal);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(31, 53, 87, 0.18);
            background: rgba(255, 255, 255, 0.96);
            font-size: 0.97rem;
            color: var(--texto);
            outline: none;
            transition: all 0.25s ease;
        }

        input::placeholder {
            color: #9aa3af;
        }

        input:focus {
            border-color: var(--dorado);
            box-shadow: 0 0 0 4px rgba(201, 163, 74, 0.16);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            margin-top: 6px;
            font-size: 0.98rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, var(--azul-profundo), var(--azul-principal));
            box-shadow: 0 10px 22px rgba(20, 36, 61, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(20, 36, 61, 0.34);
            filter: brightness(1.04);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            font-size: 0.82rem;
            color: var(--texto-suave);
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 28px 22px 24px;
                border-radius: 18px;
            }

            h2 {
                font-size: 1.8rem;
            }

            .logo-circle {
                width: 82px;
                height: 82px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo-circle">
                <img src="{% static 'img/logo_parroquia.jpg' %}" alt="Logo Parroquia Santísima Trinidad">
            </div>

            <h2>Parroquia Santísima Trinidad</h2>
            <div class="ornament"></div>
            <div class="subtitle">Acceso al sistema parroquial</div>

            {% if form.errors %}
                <p class="error">Usuario o contraseña incorrectos.</p>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="field">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit">Iniciar sesión</button>
            </form>

            <div class="footer-note">Sistema administrativo parroquial</div>
        </div>
    </div>
</body>
</html>

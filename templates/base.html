<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Parroquial{% endblock %}</title>
    <style>
        :root {
            --verde-principal: #2f5d3a;
            --verde-secundario: #2f8f46;
            --verde-suave: #eef5ee;
            --fondo: #f4f6f3;
            --blanco: #ffffff;
            --gris-borde: #d9dfd7;
            --gris-texto: #5e665d;
            --rojo: #b23b3b;
            --sombra: 0 8px 24px rgba(0,0,0,0.08);
            --radio: 16px;

            --sidebar-width: 260px;
            --topbar-height: 72px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--fondo);
            color: #222;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--verde-principal);
            color: white;
            padding: 24px 18px;

            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;

            overflow-y: auto;
            z-index: 1100;
        }

        .sidebar h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
        }

        .sidebar .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 28px;
        }

        .nav-section {
            margin-bottom: 22px;
        }

        .nav-section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.75;
            margin-bottom: 10px;
        }

        .nav-link {
            display: block;
            color: white;
            text-decoration: none;
            padding: 11px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.12);
        }

        .main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--blanco);
            padding: 18px 28px;
            border-bottom: 1px solid #e6ece4;

            position: fixed;
            top: 0;
            left: var(--sidebar-width);
            right: 0;
            height: var(--topbar-height);

            display: flex;
            justify-content: space-between;
            align-items: center;

            z-index: 1000;
        }

        .topbar-title {
            font-size: 24px;
            font-weight: bold;
            color: var(--verde-principal);
        }

        .content {
            margin-top: var(--topbar-height);
            height: calc(100vh - var(--topbar-height));
            overflow-y: auto;
            padding: 28px;
        }

        .card {
            background: var(--blanco);
            border-radius: var(--radio);
            box-shadow: var(--sombra);
            padding: 24px;
        }

        .page-title {
            margin: 0 0 20px 0;
            color: var(--verde-principal);
            font-size: 28px;
        }

        .section-title {
            margin-top: 28px;
            margin-bottom: 14px;
            color: var(--verde-principal);
            font-size: 18px;
            border-bottom: 2px solid var(--verde-suave);
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--gris-borde);
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        .checks {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--gris-borde);
            background: #fafcf9;
            border-radius: 12px;
            padding: 12px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--verde-secundario);
            color: white;
        }

        .btn-secondary {
            background: #e7ebe6;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #e7ece6;
            text-align: left;
        }

        th {
            background: var(--verde-suave);
            color: var(--verde-principal);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .empty {
            padding: 20px 0;
            color: var(--gris-texto);
        }

        ul.errorlist {
            margin: 6px 0 0 0;
            padding-left: 18px;
            color: var(--rojo);
        }

        @media (max-width: 960px) {
            body {
                overflow: auto;
            }

            .layout {
                display: block;
                height: auto;
            }

            .sidebar {
                position: relative;
                width: 100%;
                top: auto;
                left: auto;
                bottom: auto;
            }

            .main {
                margin-left: 0;
                width: 100%;
                height: auto;
            }

            .topbar {
                position: relative;
                left: auto;
                right: auto;
                top: auto;
                height: auto;
            }

            .content {
                margin-top: 0;
                height: auto;
                overflow: visible;
            }

            .grid,
            .grid-3,
            .checks {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>Santísima Trinidad</h2>
            <div class="subtitle">Sistema parroquial</div>

            <div class="nav-section">
                <div class="nav-section-title">Principal</div>
                <a class="nav-link" href="/dashboard/usuario/">Inicio</a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Sacramentos</div>
                <a class="nav-link" href="/sacramentos/nueva/">Nueva inscripción</a>
                <a class="nav-link" href="/sacramentos/lista/">Lista de inscripciones</a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Sesión</div>
                    <form method="post" action="{% url 'logout' %}" style="margin: 0;">
                    {% csrf_token %}
                    <button type="submit" class="nav-link logout-btn">Cerrar sesión</button>
                </form>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div class="topbar-title">{% block header %}Sistema Parroquial{% endblock %}</div>
                <div>Usuario: {{ request.user.username }}</div>
            </div>

            <div class="content">
                <div class="card">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
